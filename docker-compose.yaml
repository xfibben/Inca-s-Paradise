version: '3.8'

services:
  # -----------------------------------------------------------
  # 1. BASE DE DATOS (PostgreSQL)
  # -----------------------------------------------------------
  postgres:
    image: postgres:14.22-alpine3.22
    container_name: incas_db_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./docker-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # -----------------------------------------------------------
  # 2. BACKEND Y CMS (Strapi)
  # -----------------------------------------------------------
  backend:
    image: node:24
    container_name: incas_backend_test
    restart: unless-stopped
    working_dir: /srv/app
    volumes:
      - ./backend:/srv/app
    ports:
      - "1337:1337"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DB_NAME}
      DATABASE_USERNAME: ${DB_USER}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      NODE_ENV: ${NODE_ENV}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      APP_KEYS: ${APP_KEYS}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_APPS_SCRIPT_URL: ${GOOGLE_APPS_SCRIPT_URL}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_SECRET: ${PAYPAL_SECRET}
      PAYPAL_MODE: ${PAYPAL_MODE}
      PAYPAL_WEBHOOK_ID: ${PAYPAL_WEBHOOK_ID}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME}
      RESEND_NOTIFY_EMAIL: ${RESEND_NOTIFY_EMAIL}
    # Auto-instalador con vacuna para Mac (.DS_Store)
    command: >
      sh -c "
      rm -f .DS_Store;
      rm -rf dist;
      if [ ! -f package.json ]; then
        npx create-strapi-app@latest . --dbclient=postgres --dbhost=postgres --dbport=5432 --dbname=${DB_NAME} --dbusername=${DB_USER} --dbpassword=${DB_PASSWORD} --no-run --skip-cloud;
      fi;
      npm install && npm run develop
      "

  # -----------------------------------------------------------
  # 3. FRONTEND (Astro)
  # -----------------------------------------------------------
  frontend:
    image: node:24
    container_name: incas_frontend
    restart: unless-stopped
    working_dir: /srv/app
    volumes:
      - ./frontend:/srv/app
    ports:
      - "4321:4321"
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV}
      STRAPI_URL: http://backend:1337
      PUBLIC_STRAPI_URL: http://localhost:1337
      ODOO_URL: http://odoo:8069
      PUBLIC_ODOO_URL: http://localhost:8069
      PUBLIC_PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PUBLIC_GOOGLE_CLAIMS_FORM_URL: ${PUBLIC_GOOGLE_CLAIMS_FORM_URL}
      PUBLIC_RECAPTCHA_SITE_KEY: ${PUBLIC_RECAPTCHA_SITE_KEY}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
    # Auto-instalador de Astro si la carpeta está vacía
    command: >
      sh -c "
      if [ ! -f package.json ]; then
        npx create-astro@latest . --template minimal --install --no-git --yes;
      fi;
      npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0
      "

  # -----------------------------------------------------------
  # 4. BASE DE DATOS DE ODOO - PRUEBAS
  # -----------------------------------------------------------
  odoo_db:
    image: postgres:15-alpine
    container_name: incas_odoo_db_test
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ODOO_DB_NAME:-postgres}
      POSTGRES_USER: ${ODOO_DB_USER:-odoo}
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD:-odoo}
    volumes:
      - odoo_db_data_test:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ODOO_DB_USER:-odoo} -d ${ODOO_DB_NAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # -----------------------------------------------------------
  # 5. BACK OFFICE ODOO - PRUEBAS
  # -----------------------------------------------------------
  odoo:
    image: odoo:19
    container_name: incas_odoo_test
    restart: unless-stopped
    command: ["odoo", "--config=/etc/odoo/odoo.conf", "--workers=0"]
    depends_on:
      odoo_db:
        condition: service_healthy
    environment:
      HOST: odoo_db
      PORT: 5432
      USER: ${ODOO_DB_USER:-odoo}
      PASSWORD: ${ODOO_DB_PASSWORD:-odoo}
      ODOO_STRAPI_CONECTION_URL: ${ODOO_STRAPI_CONECTION_URL}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_SECRET: ${PAYPAL_SECRET}
      PAYPAL_MODE: ${PAYPAL_MODE}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME}
      RESEND_NOTIFY_EMAIL: ${RESEND_NOTIFY_EMAIL}
      GOOGLE_APPS_SCRIPT_URL: ${GOOGLE_APPS_SCRIPT_URL}
    volumes:
      - odoo_web_data_test:/var/lib/odoo
      - ./odoo/addons:/mnt/extra-addons
      - ./odoo/config/odoo.conf:/etc/odoo/odoo.conf
    ports:
      - "8069:8069"

volumes:
  odoo_db_data_test:
  odoo_web_data_test:
