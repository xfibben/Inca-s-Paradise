services:
  # -----------------------------------------------------------
  # 1. BASE DE DATOS (PostgreSQL) - PRODUCCIÓN
  # -----------------------------------------------------------
  postgres:
    image: postgres:14.22-alpine3.22
    container_name: incas_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    networks:
      incas_network:
        ipv4_address: 172.19.0.2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # 2. BACKEND Y CMS (Strapi) - PRODUCCIÓN
  # -----------------------------------------------------------
  backend:
    image: node:24-alpine
    container_name: incas_backend_prod
    restart: always
    working_dir: /srv/app
    volumes:
      - ./backend:/srv/app
      - backend_node_modules:/srv/app/node_modules
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DB_NAME}
      DATABASE_USERNAME: ${DB_USER}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      NODE_ENV: production
      PORT: 1336
      PUBLIC_URL: ${PUBLIC_URL}
      STRAPI_URL: http://backend:1336
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      APP_KEYS: ${APP_KEYS}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_APPS_SCRIPT_URL: ${GOOGLE_APPS_SCRIPT_URL}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_SECRET: ${PAYPAL_SECRET}
      PAYPAL_MODE: ${PAYPAL_MODE}
      PAYPAL_WEBHOOK_ID: ${PAYPAL_WEBHOOK_ID}
      APIS_NET_PE_TOKEN: ${APIS_NET_PE_TOKEN}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME}
      RESEND_NOTIFY_EMAIL: ${RESEND_NOTIFY_EMAIL}
    command: >
      sh -c "
      apk add --no-cache ca-certificates &&
      rm -rf dist &&
      npm install &&
      npm run build &&
      npm run start
      "
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      incas_network:
        ipv4_address: 172.19.0.10
    ports:
      - "0.0.0.0:1336:1336"
    depends_on:
      postgres:
        condition: service_healthy

  # -----------------------------------------------------------
  # 3. FRONTEND (Astro) - PRODUCCIÓN
  # -----------------------------------------------------------
  frontend:
    image: node:24-alpine
    container_name: incas_frontend_prod
    restart: always
    working_dir: /srv/app
    volumes:
      - ./frontend:/srv/app
      - frontend_node_modules:/srv/app/node_modules
      - frontend_dist:/srv/app/dist
    environment:
      NODE_ENV: production
      STRAPI_URL: http://backend:1336
      PUBLIC_STRAPI_URL: ${PUBLIC_STRAPI_URL}
      PUBLIC_ODOO_URL: ${PUBLIC_ODOO_URL}
      PUBLIC_BACKEND_URL: ${PUBLIC_STRAPI_URL}
      PUBLIC_GTM_ID: ${PUBLIC_GTM_ID}
      PUBLIC_GA_MEASUREMENT_ID: ${PUBLIC_GA_MEASUREMENT_ID}
      PUBLIC_PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PUBLIC_GOOGLE_CLAIMS_FORM_URL: ${PUBLIC_GOOGLE_CLAIMS_FORM_URL}
      PUBLIC_RECAPTCHA_SITE_KEY: ${PUBLIC_RECAPTCHA_SITE_KEY}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
    command: >
      sh -c "
      npm install --legacy-peer-deps &&
      npm run build &&
      HOST=0.0.0.0 PORT=4320 node ./dist/server/entry.mjs
      "
    networks:
      incas_network:
        ipv4_address: 172.19.0.20
    ports:
      - "0.0.0.0:4320:4320"
    depends_on:
      - backend

  # -----------------------------------------------------------
  # 4. BASE DE DATOS DE ODOO - PRODUCCIÓN
  # -----------------------------------------------------------
  odoo_db:
    image: postgres:15-alpine
    container_name: incas_odoo_db_prod
    restart: always
    environment:
      POSTGRES_DB: ${ODOO_DB_NAME:-postgres}
      POSTGRES_USER: ${ODOO_DB_USER:-odoo}
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD:-odoo}
    volumes:
      - odoo_db_data_prod:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      incas_network:
        ipv4_address: 172.19.0.3
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${ODOO_DB_USER:-odoo} -d ${ODOO_DB_NAME:-postgres}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # 5. BACK OFFICE ODOO - PRODUCCIÓN
  # -----------------------------------------------------------
  odoo:
    image: odoo:19
    container_name: incas_odoo_prod
    restart: always
    depends_on:
      odoo_db:
        condition: service_healthy
    environment:
      HOST: odoo_db
      PORT: 5432
      USER: ${ODOO_DB_USER:-odoo}
      PASSWORD: ${ODOO_DB_PASSWORD:-odoo}
      ODOO_STRAPI_CONECTION_URL: ${ODOO_STRAPI_CONECTION_URL}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_SECRET: ${PAYPAL_SECRET}
      PAYPAL_MODE: ${PAYPAL_MODE}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME}
      RESEND_NOTIFY_EMAIL: ${RESEND_NOTIFY_EMAIL}
      GOOGLE_APPS_SCRIPT_URL: ${GOOGLE_APPS_SCRIPT_URL}
    volumes:
      - odoo_web_data_prod:/var/lib/odoo
      - ./odoo/addons:/mnt/extra-addons
      - ./odoo/config/odoo.conf:/etc/odoo/odoo.conf
    networks:
      incas_network:
        ipv4_address: 172.19.0.11
    ports:
      - "0.0.0.0:8070:8069"
      - "0.0.0.0:8072:8072"

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
  frontend_dist:
  odoo_db_data_prod:
  odoo_web_data_prod:

networks:
  incas_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.19.0.0/16
